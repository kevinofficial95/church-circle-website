substitutions:
  _SERVICE: church-circle-website
  _REGION: europe-west2
  _VITE_CONTACT_FORM_ENDPOINT: https://formspree.io/f/xjgagogb

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA
      - --build-arg
      - VITE_CONTACT_FORM_ENDPOINT=${_VITE_CONTACT_FORM_ENDPOINT}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --quiet

images:
  - gcr.io/$PROJECT_ID/${_SERVICE}:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
